<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClarifAI</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="">

    <!-- Mobile Blocker Overlay -->
    <div id="mobile-overlay">
        <div class="mobile-overlay-content">
            <h2>Desktop-PC erforderlich</h2>
            <p>Aufgrund der umfangreichen Textdokumente ist die Teilnahme an dieser Studie auf dem Smartphone leider nicht möglich. Bitte öffne den Link auf einem Desktop-PC, Laptop oder Tablet (Querformat).</p>
        </div>
    </div>

    <div id="app-container" class="layout-triple">
        <!-- New: Column 1: Task Card -->
        <div id="task-description-container"></div>

        <!-- New: Column 2: Chat Interface -->
        <div id="chat-wrapper">
            <header>
                <div>
                    <h1>ClarifAI</h1>
                    <div id="session-display">Session: loading...</div>
                </div>
                <div class="header-controls">
                    <button id="opt-out-button" class="opt-out-button">Studie abbrechen</button>
                </div>
            </header>

            <main id="chat-window">
                <div class="empty-state" id="empty-state">
                    <p>Stelle eine Frage, um zu beginnen.</p>
                </div>
            </main>

            <footer>
                <div class="input-group">
                    <textarea id="user-input" placeholder="Frage eingeben..." rows="1"
                        autocomplete="off"></textarea>
                    <button id="send-button">Send</button>
                </div>
            </footer>
        </div>

        <!-- New: Column 3: PDF Viewer -->
        <section id="pdf-panel">
            <iframe id="pdf-frame" src="" title="PDF Viewer"></iframe>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>

</html>
