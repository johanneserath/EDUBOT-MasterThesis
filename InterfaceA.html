<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClarifAI</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="theme-a">

    <div id="task-description-container"></div>

    <div id="app-container" class="layout-centered">
        <header>
            <div>
                <h1>ClarifAI</h1>
                <div id="session-display">Session: loading...</div>
            </div>
        </header>

        <main id="chat-window">
            <div class="empty-state" id="empty-state">
                <p>Type a question to begin.</p>
            </div>
        </main>

        <footer>
            <div class="input-group">
                <input type="text" id="user-input" placeholder="Type your question..." autocomplete="off">
                <button id="send-button">Ask</button>
            </div>
            <div class="navigation-group">
                <button id="next-task-button" class="secondary-button">Next</button>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>

</html>
