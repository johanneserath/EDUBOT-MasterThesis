<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClarifAI</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="">

    <div id="app-container" class="layout-centered">
        <!-- New: Task Card on the Left -->
        <div id="task-description-container"></div>

        <!-- New: Chat Interface on the Right -->
        <div id="chat-wrapper">
            <header>
                <div>
                    <h1>ClarifAI</h1>
                    <div id="session-display">Session: loading...</div>
                </div>
                <div class="header-controls">
                    <button id="opt-out-button" class="opt-out-button">Stop Study</button>
                </div>
            </header>

            <main id="chat-window">
                <div class="empty-state" id="empty-state">
                    <p>Type a question to begin.</p>
                </div>
            </main>

            <footer>
                <div class="input-group">
                    <textarea id="user-input" placeholder="Type your question..." rows="1"
                        autocomplete="off"></textarea>
                    <button id="send-button">Ask</button>
                </div>
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>

</html>
