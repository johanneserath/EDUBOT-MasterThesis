<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Questionnaire - Study</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.95);
            --input-focus: #c4b5fd;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .questionnaire-container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            max-width: 650px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        header h1 {
            font-size: 1.875rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--primary-color), #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: #4b5563;
            font-size: 1rem;
        }

        .form-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #374151;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 0.75rem;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: #f9fafb;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            background: white;
        }

        .radio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .radio-option {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            border-radius: 0.75rem;
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
            font-weight: 500;
            text-align: center;
            position: relative;
        }

        .radio-option:hover {
            border-color: #d1d5db;
            background: #f3f4f6;
        }

        .radio-option input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .radio-option:has(input:checked) {
            border-color: var(--primary-color);
            background: #f5f3ff;
            color: var(--primary-color);
            font-weight: 700;
            box-shadow: 0 0 0 1px var(--primary-color);
        }

        button[type="submit"] {
            background: linear-gradient(to right, var(--primary-color), #7c3aed);
            color: white;
            padding: 1rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        #thank-you-message {
            display: none;
            text-align: center;
        }

        #thank-you-message h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        #thank-you-message p {
            color: #4b5563;
            line-height: 1.6;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background: #d1fae5;
            color: #059669;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1.5rem;
        }
    </style>
</head>

<body>
    <main class="questionnaire-container">
        <div id="questionnaire-form-wrapper">
            <header style="margin-bottom: 2.5rem; text-align: center;">
                <h1>Almost Done!</h1>
                <p>Please share some final details to complete the study.</p>
            </header>

            <form id="demographic-form">
                <div class="form-section">
                    <div class="form-group full-width">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" required min="18" max="100" placeholder="Years">
                    </div>

                    <div class="form-group full-width">
                        <label>Gender</label>
                        <div class="radio-grid">
                            <label class="radio-option"><input type="radio" name="gender" value="male" required>
                                Male</label>
                            <label class="radio-option"><input type="radio" name="gender" value="female"> Female</label>
                            <label class="radio-option"><input type="radio" name="gender" value="diverse">
                                Diverse</label>
                            <label class="radio-option"><input type="radio" name="gender" value="no-answer"> Prefer not
                                to say</label>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label for="ai-frequency">How often do you use AI Chatbots?</label>
                        <select id="ai-frequency" name="ai_frequency" required>
                            <option value="" disabled selected>Select frequency</option>
                            <option value="1">Never used before</option>
                            <option value="2">Rarely (monthly or less)</option>
                            <option value="3">Sometimes (bi-weekly)</option>
                            <option value="4">Frequently (weekly)</option>
                            <option value="5">Daily</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label for="comment">Any additional feedback? (Optional)</label>
                        <textarea id="comment" name="comment" rows="3"
                            placeholder="Tell us about your experience..."></textarea>
                    </div>
                </div>

                <div style="display: flex; flex-direction: column;">
                    <button type="submit" id="submit-btn">Complete Study</button>
                    <p style="text-align: center; font-size: 0.75rem; color: #9ca3af; margin-top: 1rem;">
                        Your data is stored anonymously for academic purposes.
                    </p>
                </div>
            </form>
        </div>

        <div id="thank-you-message">
            <div class="success-icon">✓</div>
            <h2>Great Job!</h2>
            <p>Your responses have been successfully recorded. Thank you for your valuable contribution to my Master's
                Thesis.</p>
            <div style="margin-top: 2rem; padding: 1.5rem; background: #f3f4f6; border-radius: 1rem;">
                <p style="font-weight: 600; font-size: 0.875rem;">You may now close this browser tab.</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <script src="script.js"></script>
    <script>
        // Custom initialization for questionnaire page
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('demographic-form');
            const submitBtn = document.getElementById('submit-btn');
            const formWrapper = document.getElementById('questionnaire-form-wrapper');
            const thankYouMessage = document.getElementById('thank-you-message');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                submitBtn.disabled = true;
                submitBtn.textContent = 'Submitting...';

                const formData = new FormData(form);
                const rawData = Object.fromEntries(formData.entries());

                // Prepare data for Supabase insert into 'questionaire_ans'
                const sessionUserId = sessionStorage.getItem('app_session_id') || 'unknown';

                const dbData = {
                    user_id: sessionUserId,
                    age: parseInt(rawData.age),
                    gender: rawData.gender,
                    ai_frequency: parseInt(rawData.ai_frequency),
                    comment: rawData.comment || ""
                };

                console.log("Submitting questionnaire to Supabase:", dbData);

                let success = false;
                if (typeof supabaseClient !== 'undefined' && supabaseClient) {
                    const { error } = await supabaseClient
                        .from('questionaire_ans')
                        .insert([dbData]);

                    if (error) {
                        console.error("Supabase error:", error);
                        alert("There was an error submitting your response. Please try again.");
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Complete Study';
                        return;
                    }
                    success = true;
                } else {
                    console.warn("Supabase client not found. Submission simulated.");
                    success = true; // Still show thank you in development
                }

                if (success) {
                    // Also track a general event
                    if (typeof trackEvent === 'function') {
                        trackEvent('questionnaire_completed', sessionUserId);
                    }
                    formWrapper.style.display = 'none';
                    thankYouMessage.style.display = 'block';
                }
            });
        });
    </script>
</body>

</html>
