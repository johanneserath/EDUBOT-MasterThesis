<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClarifAI - Study Opt-Out</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body.landing-page {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .opt-out-container {
            max-width: 600px;
            padding: 3rem;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .opt-out-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
        h1 {
            color: #1e293b;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }
        p {
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .back-link {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #4f46e5;
            color: white;
            text-decoration: none;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .back-link:hover {
            background: #4338ca;
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="landing-page">
    <div class="opt-out-container">
        <div class="opt-out-icon">👋</div>
        <h1>Study Participation Ended</h1>
        <p>You have successfully opted out of the study. All data collection for your session has been stopped. Thank you for your initial interest and time.</p>
        <a href="index.html" class="back-link">Return to Home</a>
    </div>
</body>
</html>
